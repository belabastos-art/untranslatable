<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untranslatable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Untranslatable</h1>
        <button id="newWordBtn" class="new-word-btn">New Word</button>

        <div id="wordDisplay" class="word-display"></div>

        <div class="navigation">
            <button id="prevBtn" class="nav-btn">&lt;</button>
            <button id="nextBtn" class="nav-btn">&gt;</button>
        </div>

        <button id="addCommentBtn" class="comment-btn">Add Comment</button>
        <div id="commentsDisplay"></div>
    </div>

    <!-- New Word Modal -->
    <div id="newWordModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Submit a New Word</h2>
            <form id="newWordForm">
                <input type="text" id="wordInput" placeholder="Word" required>
                <input type="text" id="languageInput" placeholder="Language" required>
                <textarea id="definitionInput" placeholder="Definition" rows="4" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <!-- Comment Modal -->
    <div id="commentModal" class="modal">
        <div class="modal-content">
            <span class="close-comment">&times;</span>
            <h2>This makes me think of</h2>
            <form id="commentForm">
                <textarea id="commentInput" placeholder="associations, feelings, similar words..." rows="4" required></textarea>
                <button type="submit">Submit Comment</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
